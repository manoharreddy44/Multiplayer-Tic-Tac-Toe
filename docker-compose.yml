version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ttt-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: localdb
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localdb -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama-migrate:
    image: heroiclabs/nakama:3.22.0
    container_name: ttt-nakama-migrate
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: ttt-nakama
    depends_on:
      nakama-migrate:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:localdb@postgres:5432/nakama
        --session.token_expiry_sec 7200
        --runtime.path /nakama/data/modules/build
        --config /nakama/data/nakama.yml
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./server/nakama/build:/nakama/data/modules/build
      - ./infra/nakama.yml:/nakama/data/nakama.yml
    restart: unless-stopped

volumes:
  postgres_data:
